# =====================================================================
# api-gateway - point d'entrée public du cluster (LoadBalancer)
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medconnect
  labels:
    app: api-gateway
    tier: edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: edge
    spec:
      containers:
        - name: api-gateway
          image: medconnect/api-gateway:1.0.0
          ports:
            - { containerPort: 8080, name: http }
          envFrom:
            - configMapRef: { name: medconnect-config }
          startupProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: "200m", memory: "384Mi" }
            limits:   { cpu: "1000m", memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: medconnect
spec:
  # LoadBalancer = exposé hors du cluster (un IP public est attribué par le cloud).
  # En local (KillerCoda/minikube), utilisez NodePort à la place.
  type: LoadBalancer
  selector: { app: api-gateway }
  ports:
    - { port: 8080, targetPort: 8080, name: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: medconnect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
