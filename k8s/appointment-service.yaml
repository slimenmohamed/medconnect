# =====================================================================
# appointment-service - Deployment + Service + HPA
#
# Pré-requis :
#  - Image disponible : medconnect/appointment-service:1.0.0
#  - Metrics-server installé dans le cluster (pour le HPA)
#  - Infra (mysql, rabbitmq, keycloak, config-server, discovery-server)
#    déployée en amont
#
# Démarrage :
#   kubectl apply -f k8s/00-namespace.yaml
#   kubectl apply -f k8s/01-configmap.yaml
#   kubectl apply -f k8s/appointment-service.yaml
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: medconnect
  labels:
    app: appointment-service
    tier: backend
spec:
  # Démarre avec 2 répliques minimum (HPA gérera la montée).
  # Spring Cloud LoadBalancer (côté gateway) ventile les appels Feign sur les pods.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
        tier: backend
      annotations:
        # Pour le scrape Prometheus
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: appointment-service
          image: medconnect/appointment-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8081, name: http }
          envFrom:
            - configMapRef: { name: medconnect-config }
            - secretRef:    { name: medconnect-secrets }
          # Tolérance aux pannes : startup probe pour les démarrages lents (Spring),
          # readiness pour le traffic, liveness pour le restart auto.
          startupProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: medconnect
  labels: { app: appointment-service }
spec:
  type: ClusterIP   # En interne uniquement ; le gateway expose via Eureka
  selector: { app: appointment-service }
  ports:
    - { port: 8081, targetPort: 8081, name: http }
---
# =====================================================================
# Horizontal Pod Autoscaler : passe de 2 à 8 pods selon la charge CPU.
# Démontre l'auto-scaling K8s + load balancing inter-pods via Eureka.
# =====================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: appointment-service-hpa
  namespace: medconnect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: appointment-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # évite le yo-yo
    scaleUp:
      stabilizationWindowSeconds: 30
---
# PodDisruptionBudget : garantit qu'au moins 1 pod reste up en cas d'évacuation
# de nœud (drain, upgrade, etc.). Important pour la tolérance aux pannes.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: appointment-service-pdb
  namespace: medconnect
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: appointment-service
