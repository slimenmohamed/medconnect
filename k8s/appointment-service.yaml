# Manifest K8s minimaliste (BONUS).
# Pré-requis: avoir poussé l'image medconnect/appointment-service:1.0.0
# dans un registre accessible (Docker Hub, GHCR, etc.).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  labels: { app: appointment-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: appointment-service }
  template:
    metadata:
      labels: { app: appointment-service }
    spec:
      containers:
        - name: appointment-service
          image: medconnect/appointment-service:1.0.0
          ports: [{ containerPort: 8081 }]
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: docker }
            - { name: CONFIG_SERVER_URL,      value: http://config-server:8888 }
            - { name: EUREKA_URL,             value: http://discovery-server:8761/eureka/ }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
spec:
  type: LoadBalancer
  selector: { app: appointment-service }
  ports:
    - { port: 8081, targetPort: 8081 }
