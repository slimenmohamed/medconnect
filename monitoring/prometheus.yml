# Prometheus scrape config (bonus monitoring)
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'appointment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['appointment-service:8081']

  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'discovery-server'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['discovery-server:8761']
