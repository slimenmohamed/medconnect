# =========================================================
# MedConnect - docker-compose
# Tout l'écosystème démarre avec: docker compose up -d
# =========================================================

services:

  # ---------------------- INFRASTRUCTURE ----------------------

  mysql:
    image: mysql:8.0
    container_name: mc-mysql
    # Force UTF-8 partout (sinon Latin1 par défaut -> accents cassés).
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # 3306 côté hôte est déjà pris par un MySQL local => on expose sur 3307.
      # Les conteneurs (appointment-service) continuent d'utiliser 3306 EN INTERNE
      # via le hostname "mysql" (réseau docker medconnect-net).
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks: [medconnect-net]

  mongo:
    image: mongo:7
    container_name: mc-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks: [medconnect-net]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks: [medconnect-net]

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: mc-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # IMPORTANT : URL publique vue du navigateur. C'est cette URL qui est mise
      # dans le claim "iss" des tokens. Les backends consomment les JWKS via l'URL
      # INTERNE (http://keycloak:8080) mais valident la signature uniquement
      # (pas d'iss check) -> cohérence garantie. Sans cela, le frontend reçoit
      # un token avec iss=localhost:8180 et le gateway, qui s'attend à
      # iss=keycloak:8080, le rejette en 401.
      KC_HOSTNAME_URL: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_ADMIN_URL: ${KEYCLOAK_PUBLIC_URL}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes/medconnect:/opt/keycloak/themes/medconnect:ro
    ports:
      - "8180:8080"
    healthcheck:
      # Keycloak 23 expose /health/ready sur le port 8080 quand KC_HEALTH_ENABLED=true
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [medconnect-net]

  # ---------------------- SPRING CLOUD CORE ----------------------

  config-server:
    build: ./config-server
    container_name: mc-config-server
    environment:
      CONFIG_REPO_PATH: "file:/config-repo"
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "8888:8888"
    networks: [medconnect-net]

  discovery-server:
    build: ./discovery-server
    container_name: mc-discovery
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "8761:8761"
    networks: [medconnect-net]

  # ---------------------- MICROSERVICES MÉTIER ----------------------

  appointment-service:
    build: ./appointment-service
    container_name: mc-appointment
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      mysql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    ports:
      - "8081:8081"
    networks: [medconnect-net]

  medical-records-service:
    build: ./medical-records-service
    container_name: mc-records
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      MONGO_HOST: mongo
      MONGO_USER: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_DB: ${MONGO_DB_NAME}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      EUREKA_HOST: discovery-server
      HOSTNAME: medical-records-service
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      mongo: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    ports:
      - "5001:5001"
    networks: [medconnect-net]

  # ---------------------- GATEWAY ----------------------

  api-gateway:
    build: ./api-gateway
    container_name: mc-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://discovery-server:8761/eureka/
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      appointment-service: { condition: service_healthy }
      medical-records-service: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    ports:
      - "8080:8080"
    networks: [medconnect-net]

  # ---------------------- FRONTEND ----------------------

  frontend:
    build:
      context: ./frontend
      args:
        # Le frontend a besoin de connaître l'URL PUBLIQUE de Keycloak (vue du navigateur)
        KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL}
        KEYCLOAK_REALM: ${KEYCLOAK_REALM}
        KEYCLOAK_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID}
        API_BASE: http://localhost:8080
    container_name: mc-frontend
    depends_on:
      api-gateway: { condition: service_healthy }
    ports:
      - "80:80"
    networks: [medconnect-net]

networks:
  medconnect-net:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
