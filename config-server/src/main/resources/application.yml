server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Dans Docker, /config-repo est monté en volume depuis ../config-repo
          # En local, on tombe sur le classpath:/config-repo si on package
          search-locations: ${CONFIG_REPO_PATH:file:/config-repo,classpath:/config-repo}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
